name: 🚀 Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: 📦 Validate & publish
    runs-on: windows-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🔎 Verify tag targets master
        shell: bash
        run: test "$GITHUB_SHA" = "$(git rev-parse origin/master)"

      - name: 🔎 Verify package version
        shell: bash
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: 🗜️ Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🗃️ Build database
        run: yarn db:build

      - name: 🔎 Validate database
        run: yarn db:validate

      - name: ✅ Validate source
        run: yarn validate

      - name: 🏗️ Build applications
        run: yarn build

      - name: 🔎 Verify build layout
        shell: bash
        run: |
          test -f dist/electron/browser/index.html
          test -f dist/docs/browser/index.html
          test -f .electron/electron/main/index.js
          test -f .electron/electron/preload.js
          test -f resources/database/qdb.sqlite

      - name: 🚀 Publish draft GitHub Release
        run: yarn electron-forge publish --arch=x64 --platform=win32
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📚 Upload documentation pages
        if: contains(github.ref, 'beta') == false
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/docs/browser

  deploy:
    name: 📚 Deploy documentation
    if: contains(github.ref, 'beta') == false
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4
