name: 🚀 Build & Publish

on:
  push:
    branches:
      - master

# on:
#  push:
#    tags:
#      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: 📦 Validate, publish & deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      #      - name: 🔎 Verify tag targets master
      #        shell: bash
      #        run: test "$GITHUB_SHA" = "$(git rev-parse origin/master)"

      # - name: 🔎 Verify package version
      #  shell: bash
      #  run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: 🗜️ Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🗃️ Build database
        run: yarn db:build

      - name: 🔎 Validate database
        run: yarn db:validate

      - name: ✅ Validate source
        run: yarn validate

      - name: 🏗️ Build applications
        run: yarn build

      - name: 🔎 Verify build layout
        shell: bash
        run: |
          test -f dist/electron/browser/index.html
          test -f dist/docs/browser/index.html
          test -f .electron/electron/main/index.js
          test -f .electron/electron/preload.js
          test -f resources/database/qdb.sqlite

      - name: 🪟 Install Windows packaging tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends mono-devel wine wine32:i386 wine64
          mono --version
          wine --version

      - name: 🚀 Publish draft GitHub Release
        run: yarn electron-forge publish --arch=x64 --platform=win32
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Copy index.html to 404.html
        if: contains(github.ref, 'beta') == false
        shell: bash
        run: cp ./dist/docs/browser/index.html ./dist/docs/browser/404.html

      - name: 🚀 Deploy Github Pages
        if: contains(github.ref, 'beta') == false
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_branch: gh-pages
          publish_dir: ./dist/docs/browser
