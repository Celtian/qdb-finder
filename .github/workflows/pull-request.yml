name: 🧪 Test PR

'on': pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: 🛠️ Validate & Package
    runs-on: ubuntu-latest
    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v7

      - name: 🗜️ Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: 🛠️ Install dependencies
        uses: ./.github/actions/cached-deps

      - name: 🗃️ Build database
        run: yarn db:build

      - name: 🔎 Validate database
        run: yarn db:validate

      - name: 🧹 Check formatting
        run: yarn format:check

      - name: 🧹 Lint
        run: yarn lint

      - name: 🧪 Test with coverage
        run: yarn test:coverage

      - name: 📊 Set Electron coverage report to PR
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.type != 'Bot' }}
        uses: ./.github/actions/set-report-to-pr
        with:
          coverage-file: coverage/electron/cobertura-coverage.xml
          report-name: Electron Coverage
          comment-header: electron-coverage-report

      - name: 📊 Set documentation coverage report to PR
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.type != 'Bot' }}
        uses: ./.github/actions/set-report-to-pr
        with:
          coverage-file: coverage/docs/cobertura-coverage.xml
          report-name: Documentation Coverage
          comment-header: documentation-coverage-report

      - name: 📊 Set tools coverage report to PR
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.type != 'Bot' }}
        uses: ./.github/actions/set-report-to-pr
        with:
          coverage-file: coverage/tools/cobertura-coverage.xml
          report-name: Node Tools Coverage
          comment-header: node-tools-coverage-report

      - name: 🏗️ Build applications
        run: yarn build

      - name: 📦 Package Windows x64 application
        run: yarn electron-forge package --arch=x64 --platform=win32

      - name: 🔎 Verify artifact layout
        run: |
          test -f "out/qdb-finder-win32-x64/QDB Finder.exe"
          test -f out/qdb-finder-win32-x64/resources/app.asar
          test -f out/qdb-finder-win32-x64/resources/database/qdb.sqlite
