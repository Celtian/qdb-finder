<header>
  <a class="brand" routerLink="/"><span>QDB</span> Finder</a
  ><a class="github" href="https://github.com/Celtian/qdb-finder">GitHub</a>
</header>
<div class="layout">
  <aside aria-label="Documentation navigation">
    <p>Documentation</p>
    <nav>
      @for (link of links; track link[0]) {
        <a
          [routerLink]="'/' + link[0]"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ link[1] }}</a
        >
      }
    </nav>
  </aside>
  <main><router-outlet /></main>
</div>
