<header>
  <a class="brand" routerLink="/"><span>QDB</span> Finder</a
  ><a class="github" [href]="site.links.repository">GitHub</a>
</header>
<div class="layout">
  <aside aria-label="Documentation navigation">
    <p>Documentation</p>
    <nav class="docs-nav" aria-label="Documentation pages">
      @for (link of links; track link[0]) {
        <a
          routerLinkActive="active"
          [routerLink]="'/' + link[0]"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ link[1] }}</a
        >
      }
    </nav>
  </aside>
  <main><router-outlet /></main>
</div>
<footer>
  <div class="footer-inner">
    <p>
      &copy; 2026 Dominik Hladík ·
      <a [href]="site.links.version">QDB Finder {{ site.versionLabel }}</a>
    </p>
    <nav class="footer-links" aria-label="Project links">
      <a [href]="site.links.latestRelease">Latest download</a>
      <a [href]="site.links.repository">Source</a>
      <a [href]="site.links.changelog">Changelog</a>
      <a [href]="site.links.license">MIT License</a>
    </nav>
  </div>
</footer>
