<a class="skip-link" href="#main-content">Skip to content</a>
<header class="site-header">
  <mat-toolbar>
    <button
      class="navigation-trigger"
      type="button"
      mat-icon-button
      aria-label="Open documentation navigation"
      aria-controls="documentation-navigation"
      [attr.aria-expanded]="navigationOpened()"
      (click)="toggleNavigation()"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <a class="brand" routerLink="/" aria-label="QDB Finder documentation home">
      <img ngSrc="qdb-finder.png" width="28" height="28" alt="" priority />
      <span>QDB Finder</span>
      <span class="documentation-label">Documentation</span>
    </a>
    <span class="toolbar-spacer"></span>
    <a mat-button [href]="site.links.repository">
      <mat-icon>code</mat-icon>
      GitHub
    </a>
  </mat-toolbar>
</header>

<mat-sidenav-container>
  <mat-sidenav
    id="documentation-navigation"
    aria-label="Documentation navigation"
    [mode]="navigationMode()"
    [opened]="navigationOpened()"
    (openedChange)="navigationChanged($event)"
  >
    <p class="navigation-heading">Documentation</p>
    <mat-nav-list aria-label="Documentation pages">
      @for (link of links; track link.path) {
        <a
          #activePage="routerLinkActive"
          mat-list-item
          routerLinkActive="active"
          ariaCurrentWhenActive="page"
          [activated]="activePage.isActive"
          [routerLink]="'/' + link.path"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeNavigation()"
        >
          <mat-icon matListItemIcon>{{ link.icon }}</mat-icon>
          <span matListItemTitle>{{ link.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="content-shell">
      <main id="main-content" tabindex="-1"><router-outlet /></main>
      <footer>
        <div class="footer-inner">
          <p>
            &copy; {{ site.copyrightYear }} Dominik Hladík ·
            <a [href]="site.links.version">QDB Finder {{ site.versionLabel }}</a>
          </p>
          <nav class="footer-links" aria-label="Project links">
            <a mat-button [href]="site.links.latestRelease">Latest download</a>
            <a mat-button [href]="site.links.repository">Source</a>
            <a mat-button [href]="site.links.changelog">Changelog</a>
            <a mat-button [href]="site.links.license">MIT License</a>
          </nav>
        </div>
      </footer>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
