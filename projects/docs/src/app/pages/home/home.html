<article>
  <p class="eyebrow">{{ page().eyebrow }}</p>
  <h1>{{ page().title }}</h1>
  <p class="lead">{{ page().lead }}</p>
  @for (section of page().sections; track section.title) {
    <section>
      <h2>{{ section.title }}</h2>
      <p>{{ section.body }}</p>
      @if (section.code) {
        <pre><code>{{ section.code }}</code></pre>
      }
    </section>
  }
</article>
