<button
  class="navigation-trigger"
  type="button"
  aria-label="Open main navigation"
  [matMenuTriggerFor]="navigationMenu"
>
  <mat-icon>menu</mat-icon>
</button>

<mat-menu #navigationMenu="matMenu" aria-label="Primary navigation">
  <a
    mat-menu-item
    routerLink="/"
    routerLinkActive="active"
    ariaCurrentWhenActive="page"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </a>
  <a mat-menu-item routerLink="/players" routerLinkActive="active" ariaCurrentWhenActive="page">
    <mat-icon>groups</mat-icon>
    <span>Players</span>
  </a>
  <a mat-menu-item routerLink="/teams" routerLinkActive="active" ariaCurrentWhenActive="page">
    <mat-icon>shield</mat-icon>
    <span>Teams</span>
  </a>
  <a mat-menu-item routerLink="/leagues" routerLinkActive="active" ariaCurrentWhenActive="page">
    <mat-icon>emoji_events</mat-icon>
    <span>Leagues</span>
  </a>
  <a mat-menu-item routerLink="/referees" routerLinkActive="active" ariaCurrentWhenActive="page">
    <mat-icon>sports</mat-icon>
    <span>Referees</span>
  </a>
  <a mat-menu-item routerLink="/stadiums" routerLinkActive="active" ariaCurrentWhenActive="page">
    <mat-icon>stadium</mat-icon>
    <span>Stadiums</span>
  </a>
  <a mat-menu-item routerLink="/databases" routerLinkActive="active" ariaCurrentWhenActive="page">
    <mat-icon>storage</mat-icon>
    <span>Databases</span>
  </a>
  <mat-divider />
  <button type="button" mat-menu-item (click)="openAbout()">
    <mat-icon>info</mat-icon>
    <span>About</span>
  </button>
</mat-menu>
