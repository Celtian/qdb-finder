<a
  class="brand"
  routerLink="/"
  aria-label="QDB Finder home"
  (click)="navigation.destinationSelected()"
>
  <img ngSrc="qdb-finder.png" width="28" height="28" alt="" priority />
  <span>QDB Finder</span>
</a>

<nav aria-label="Primary navigation">
  @for (link of links; track link.path) {
    <a
      class="primary-navigation-link"
      matButton
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      [routerLink]="link.path"
      [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
      (click)="navigation.destinationSelected()"
    >
      <mat-icon>{{ link.icon }}</mat-icon>
      <span>{{ link.label }}</span>
    </a>
  }
</nav>

<div class="about-action">
  <mat-divider />
  <button type="button" matButton (click)="openAbout()">
    <mat-icon>info</mat-icon>
    <span>About</span>
  </button>
</div>
