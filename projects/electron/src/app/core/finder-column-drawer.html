<form
  class="column-form"
  aria-labelledby="finder-column-title"
  (submit)="apply(); $event.preventDefault()"
>
  <div class="drawer-header">
    <h2 id="finder-column-title">Columns</h2>
    <button matIconButton type="button" aria-label="Close columns" (click)="cancel()">
      <mat-icon aria-hidden="true">close</mat-icon>
    </button>
  </div>

  <div class="column-fields" cdkScrollable>
    <p id="column-order-instructions">
      Choose and reorder the columns shown in the {{ data.finder }} table. Drag a handle or focus it
      and use the Up and Down arrow keys.
    </p>
    <div
      class="column-list"
      cdkDropList
      cdkDropListLockAxis="y"
      role="list"
      [cdkDropListData]="orderedColumns()"
      (cdkDropListDropped)="drop($event)"
    >
      @for (column of orderedColumns(); track column.key) {
        <div class="column-row" cdkDrag role="listitem" [cdkDragData]="column">
          <mat-checkbox [formField]="columnsForm[column.key]">
            {{ column.label }}
          </mat-checkbox>
          <button
            class="drag-handle"
            cdkDragHandle
            matIconButton
            type="button"
            aria-describedby="column-order-instructions"
            [attr.aria-label]="'Reorder ' + column.label + ' column'"
            (keydown.arrowup)="moveColumn(column, -1); $event.preventDefault()"
            (keydown.arrowdown)="moveColumn(column, 1); $event.preventDefault()"
          >
            <mat-icon aria-hidden="true">drag_indicator</mat-icon>
          </button>
          <ng-template cdkDragPreview [matchSize]="true">
            <div class="column-drag-preview" aria-hidden="true">
              <span>{{ column.label }}</span>
              <mat-icon>drag_indicator</mat-icon>
            </div>
          </ng-template>
        </div>
      }
    </div>
    <p class="live-announcement" aria-live="polite">{{ announcement() }}</p>
  </div>

  <div class="drawer-footer">
    <button matButton type="button" (click)="resetDefaults()">Reset to defaults</button>
    <span></span>
    <button matButton type="button" (click)="cancel()">Cancel</button>
    <button matButton="filled" type="submit">Apply</button>
  </div>
</form>
