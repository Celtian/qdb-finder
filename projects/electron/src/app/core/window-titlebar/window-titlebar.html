<header class="titlebar">
  <div class="app-identity">
    <app-navigation-menu />
    <div class="brand">
      <img ngSrc="qdb-finder.png" width="24" height="24" alt="" priority />
      <span>QDB Finder</span>
      @if (databaseInfo(); as database) {
        <span class="database-name" aria-label="Active database">· {{ database.name }}</span>
      }
    </div>
  </div>
  @if (desktop && !desktop.nativeControls) {
    <nav class="window-actions" aria-label="Window controls">
      <button
        class="window-button"
        type="button"
        aria-label="Minimize window"
        (mousedown)="$event.preventDefault()"
        (click)="minimize()"
      >
        <mat-icon>remove</mat-icon>
      </button>
      <button
        class="window-button"
        type="button"
        [attr.aria-label]="maximized() ? 'Restore window' : 'Maximize window'"
        (mousedown)="$event.preventDefault()"
        (click)="toggleMaximize()"
      >
        <mat-icon>{{ maximized() ? 'filter_none' : 'crop_square' }}</mat-icon>
      </button>
      <button
        class="window-button close-button"
        type="button"
        aria-label="Close window"
        (mousedown)="$event.preventDefault()"
        (click)="close()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </nav>
  }
</header>
