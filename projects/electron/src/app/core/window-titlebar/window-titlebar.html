<header class="titlebar">
  <div class="brand">
    <img ngSrc="qdb-finder.png" width="24" height="24" alt="" priority />
    <span>QDB Finder</span>
  </div>
  @if (desktop) {
    <nav class="window-actions" aria-label="Window controls">
      <button class="window-button" type="button" aria-label="Minimize window" (click)="minimize()">
        <mat-icon>remove</mat-icon>
      </button>
      <button
        class="window-button"
        type="button"
        [attr.aria-label]="maximized() ? 'Restore window' : 'Maximize window'"
        (click)="toggleMaximize()"
      >
        <mat-icon>{{ maximized() ? 'fullscreen_exit' : 'crop_square' }}</mat-icon>
      </button>
      <button
        class="window-button close-button"
        type="button"
        aria-label="Close window"
        (click)="close()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </nav>
  }
</header>
