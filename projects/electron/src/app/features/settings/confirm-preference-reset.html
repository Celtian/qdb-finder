<h2 mat-dialog-title>Reset finder preferences?</h2>
<mat-dialog-content>
  Saved filters and visible columns for players, teams, leagues, referees and stadiums will return
  to their defaults. Your theme and databases will not change.
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button type="button" mat-button mat-dialog-close>Cancel</button>
  <button type="button" mat-flat-button [mat-dialog-close]="true">Reset preferences</button>
</mat-dialog-actions>
